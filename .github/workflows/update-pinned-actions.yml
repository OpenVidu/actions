name: Release and Update Pinned Actions

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version tag (e.g., v1.0.3)"
        required: true
        type: string

permissions: {}

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      sha: ${{ steps.get_sha.outputs.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Get commit SHA
        id: get_sha
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Create Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ inputs.version }}
        run: gh release create "$VERSION" --title "$VERSION" --generate-notes

  update-pinned-actions:
    name: Update Pinned Actions Across Org
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Find and update repositories
        env:
          GH_TOKEN: ${{ secrets.OPENVIDU_GITHUB_TOKEN }}
          VERSION: ${{ inputs.version }}
          TAG_SHA: ${{ needs.release.outputs.sha }}
        run: |
          set -euo pipefail

          if [[ -z "$GH_TOKEN" ]]; then
            echo "::error::OPENVIDU_GITHUB_TOKEN secret is not set. A PAT with org-wide repo access is required."
            exit 1
          fi

          tag_sha="$TAG_SHA"
          echo "Release ${VERSION} pinned to SHA ${tag_sha}"

          # Search returns the exact repo:file pairs that reference OpenVidu/actions
          echo "Searching for files using OpenVidu/actions..."
          mapfile -t items < <(
            gh api search/code \
              -X GET \
              --paginate \
              -f per_page=100 \
              -f q='uses: OpenVidu/actions/ org:OpenVidu language:yaml' \
              --jq '.items[] | .repository.full_name + ":" + .path' \
            | sort -u
          )

          if [[ ${#items[@]} -eq 0 ]]; then
            echo "No files found using OpenVidu/actions"
            exit 0
          fi

          # Group file paths by repository
          declare -A repo_files
          for item in "${items[@]}"; do
            repo="${item%%:*}"
            path="${item#*:}"
            repo_files["$repo"]+="${path}"$'\n'
          done

          echo "Found ${#repo_files[@]} repositories across ${#items[@]} files:"
          printf '  %s\n' "${items[@]}"

          for repo in "${!repo_files[@]}"; do
            echo ""
            echo "========================================="
            echo "Processing $repo..."
            echo "========================================="

            work_dir=$(mktemp -d)
            if ! gh repo clone "$repo" "$work_dir" -- --depth 1; then
              echo "Failed to clone $repo, skipping..."
              rm -rf "$work_dir"
              continue
            fi

            pushd "$work_dir" > /dev/null

            echo "Replacing OpenVidu/actions references with SHA ${tag_sha} (${VERSION})..."

            # sed only the files the search already identified — no find needed
            readarray -t files < <(printf '%s' "${repo_files[$repo]}" | grep -v '^$')
            printf '%s\0' "${files[@]}" \
              | xargs -0 sed -i -E "s|(OpenVidu/actions/[^@]+)@[a-zA-Z0-9._-]+([ \t]+# [^ ]+)?|\1@${tag_sha} # ${VERSION}|g"

            if git diff --quiet; then
              echo "No changes needed for $repo"
            else
              echo "Changes detected, creating PR..."
              branch="chore/update-openvidu-actions-${VERSION}"

              git checkout -b "$branch"
              git config user.name "github-actions[bot]"
              git config user.email "github-actions[bot]@users.noreply.github.com"
              git add -A
              git commit -m "chore: update OpenVidu/actions to ${VERSION}"
              git push origin "$branch"

              default_branch=$(gh repo view "$repo" --json defaultBranchRef --jq '.defaultBranchRef.name')
              pr_body="Updates pinned references of \`OpenVidu/actions\` to \`${VERSION}\`."
              pr_body+=$'\n\n'"Auto-generated by the [update-pinned-actions](https://github.com/OpenVidu/actions/actions/workflows/update-pinned-actions.yml) workflow."

              gh pr create \
                --repo "$repo" \
                --base "$default_branch" \
                --head "$branch" \
                --title "chore: update OpenVidu/actions to ${VERSION}" \
                --body "$pr_body"
            fi

            popd > /dev/null
            rm -rf "$work_dir"
          done
