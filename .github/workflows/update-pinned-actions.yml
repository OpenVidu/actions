name: Release and Update Pinned Actions

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version tag (e.g., v1.0.3)"
        required: true
        type: string
      pinact_version:
        description: "Pinact version to install (e.g., v3.9.0)"
        required: false
        default: "v3.9.0"
        type: string

permissions: {}

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Create Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ inputs.version }}
        run: gh release create "$VERSION" --title "$VERSION" --generate-notes

  update-pinned-actions:
    name: Update Pinned Actions Across Org
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Setup Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version: stable
          cache: false

      - name: Install pinact
        env:
          PINACT_VERSION: ${{ inputs.pinact_version }}
        run: go install "github.com/suzuki-shunsuke/pinact/v3/cmd/pinact@${PINACT_VERSION}"

      - name: Find and update repositories
        env:
          GH_TOKEN: ${{ secrets.OPENVIDU_GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.OPENVIDU_GITHUB_TOKEN }}
          VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail

          if [[ -z "$GH_TOKEN" ]]; then
            echo "::error::OPENVIDU_GITHUB_TOKEN secret is not set. A PAT with org-wide repo access is required."
            exit 1
          fi

          echo "Searching for repositories using OpenVidu/actions..."
          search_output=$(
            gh api search/code \
              -X GET \
              --paginate \
              -f per_page=100 \
              -f q='uses: OpenVidu/actions/ org:OpenVidu language:yaml' \
              --jq '.items[].repository.full_name' \
            | sort -u
          )

          if [[ -z "$search_output" ]]; then
            echo "No repositories found using OpenVidu/actions"
            exit 0
          fi

          mapfile -t repos <<< "$search_output"

          echo "Found ${#repos[@]} repositories:"
          printf '  %s\n' "${repos[@]}"

          for repo in "${repos[@]}"; do
            echo ""
            echo "========================================="
            echo "Processing $repo..."
            echo "========================================="

            work_dir=$(mktemp -d)
            if ! gh repo clone "$repo" "$work_dir" -- --depth 1; then
              echo "Failed to clone $repo, skipping..."
              rm -rf "$work_dir"
              continue
            fi

            pushd "$work_dir" > /dev/null

            # Update only OpenVidu/actions references to latest version
            echo "Running pinact on $repo..."
            pinact run -u -diff -i "OpenVidu/actions/.*" || echo "::warning::pinact exited with code $? for $repo"

            if git diff --quiet; then
              echo "No changes needed for $repo"
            else
              echo "Changes detected, creating PR..."
              branch="chore/update-openvidu-actions-${VERSION}"

              git checkout -b "$branch"
              git config user.name "github-actions[bot]"
              git config user.email "github-actions[bot]@users.noreply.github.com"
              git add -A
              git commit -m "chore: update OpenVidu/actions to ${VERSION}"
              git push origin "$branch"

              default_branch=$(gh repo view "$repo" --json defaultBranchRef --jq '.defaultBranchRef.name')
              pr_body="Updates pinned references of \`OpenVidu/actions\` to \`${VERSION}\`."
              pr_body+=$'\n\n'"Auto-generated by the [update-pinned-actions](https://github.com/OpenVidu/actions/actions/workflows/update-pinned-actions.yml) workflow."

              gh pr create \
                --repo "$repo" \
                --base "$default_branch" \
                --head "$branch" \
                --title "chore: update OpenVidu/actions to ${VERSION}" \
                --body "$pr_body"
            fi

            popd > /dev/null
            rm -rf "$work_dir"
          done
