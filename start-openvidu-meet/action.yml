name: Start OpenVidu Meet
description: Checkout, build, and optionally start OpenVidu Meet and wait for it to be ready
inputs:
  timeout:
    description: Maximum time to wait for OpenVidu Meet to start (in milliseconds)
    required: false
    default: '60000'
  skip_backend_start:
    description: Skip starting the backend server (only build the project)
    required: false
    default: 'false'
runs:
  using: 'composite'
  steps:
    - name: Checkout OpenVidu Meet
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        ref: ${{ github.ref }}

    - name: Build OpenVidu Meet
      shell: bash
      run: ./meet.sh build --skip-install

    - name: Start OpenVidu Meet
      if: ${{ inputs.skip_backend_start != 'true' }}
      shell: bash
      run: ./meet.sh start --ci --skip-install > meet_backend.log 2>&1 &

    - name: Wait for OpenVidu Meet to Start
      if: ${{ inputs.skip_backend_start != 'true' }}
      shell: bash
      run: |
        echo "Waiting for OpenVidu Meet to be available at http://localhost:6080/meet/health..."
        timeout_ms=${{ inputs.timeout }}
        timeout_s=$((timeout_ms / 1000))
        start_time=$(date +%s)

        while true; do
          if curl -s -f http://localhost:6080/meet/health > /dev/null 2>&1; then
            echo "OpenVidu Meet is up and running!"
            break
          fi

          current_time=$(date +%s)
          elapsed=$((current_time - start_time))

          if [ $elapsed -ge $timeout_s ]; then
            echo "Timeout: OpenVidu Meet did not start within ${timeout_s} seconds"
            exit 1
          fi

          echo "Waiting... (${elapsed}s/${timeout_s}s)"
          sleep 5
        done
