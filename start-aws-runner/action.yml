name: 'Start AWS EC2 Runner'
description: 'Start an EC2 GitHub Actions runner on AWS'
inputs:
  aws-instance-type:
    description: 'EC2 instance type'
    required: false
    default: 'c5.large'
  aws-access-key-id:
    description: 'AWS Access Key ID'
    required: true
  aws-secret-access-key:
    description: 'AWS Secret Access Key'
    required: true
  aws-region:
    description: 'AWS Region'
    required: true
  github-token:
    description: 'GitHub token for runner registration'
    required: true
  ec2-image-id:
    description: 'AMI ID for the EC2 instance'
    required: true
  subnet-id:
    description: 'AWS Subnet ID'
    required: true
  security-group-id:
    description: 'AWS Security Group ID'
    required: true
  workflow-name:
    description: 'Workflow name for tagging'
    required: false
    default: ${{ github.workflow }}
  repository-name:
    description: 'Repository name for tagging'
    required: false
    default: ${{ github.repository }}
  run-runner-as-user:
    description: 'User under whom the runner service should run. If not set, it will not be passed to the underlying action.'
    required: false
  market-type:
    description: "Market (purchasing) option for the instance, e.g. 'spot'. If not set, it will not be passed to the underlying action."
    required: false

outputs:
  label:
    description: 'Label of the started EC2 runner'
    value: ${{ steps.start-ec2-runner.outputs.label }}
  ec2-instance-id:
    description: 'EC2 instance ID of the started runner'
    value: ${{ steps.start-ec2-runner.outputs.ec2-instance-id }}

runs:
  using: 'composite'
  steps:
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@8df5847569e6427dd6c4fb1cf565c83acfa8afa7 # v6.0.0
      with:
        aws-access-key-id: ${{ inputs.aws-access-key-id }}
        aws-secret-access-key: ${{ inputs.aws-secret-access-key }}
        aws-region: ${{ inputs.aws-region }}

    - name: Start EC2 runner
      id: start-ec2-runner
      uses: machulav/ec2-github-runner@343a1b2ae682e681c3cec9a235d882da17ff04ef # v2.6.1
      with:
        mode: start
        github-token: ${{ inputs.github-token }}
        ec2-image-id: ${{ inputs.ec2-image-id }}
        ec2-instance-type: ${{ inputs.aws-instance-type }}
        subnet-id: ${{ inputs.subnet-id }}
        security-group-id: ${{ inputs.security-group-id }}
        aws-resource-tags: >
          [
            {"Key": "Name", "Value": "ec2-github-runner"},
            {"Key": "Workflow", "Value": "${{ inputs.workflow-name }}"},
            {"Key": "GitHubRepository", "Value": "${{ inputs.repository-name }}"}
          ]
        run-runner-as-user: ${{ inputs.run-runner-as-user }}
        market-type: ${{ inputs.market-type }}
